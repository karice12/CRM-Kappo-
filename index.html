<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kappo Business — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div id="login-screen" class="login-screen active">
    <div class="login-container">
      <h1>KAPPO BUSINESS</h1>
      <input type="text" id="login-user" placeholder="USUÁRIO" />
      <input type="password" id="login-pass" placeholder="SENHA" />
      <button onclick="Auth.handleLogin()">ACESSAR SISTEMA</button>
    </div>
  </div>

  <div id="main-dashboard" class="dashboard-layout hidden">
    <aside class="sidebar">
      <div class="logo">KAPPO</div>
      <nav>
        <button onclick="App.navigate('home')">🏠 Início</button>
        <button onclick="App.navigate('clientes')">👥 Clientes</button>
        <button onclick="App.navigate('financeiro')">💰 Financeiro</button>
        <hr>
        <button onclick="SessionManager.destroy()">🚪 Sair</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <h2 id="view-title">Dashboard</h2>
      </header>
      <div id="app-view">
        </div>
    </main>
  </div>

  <script src="assets/js/db.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
